name: Build Native Linux Version
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - '.github/workflows/build.yml'
      - 'package.json'
  schedule:
    - cron: '0 0 1,15 * *' # Chạy vào ngày 1 và 15 hằng tháng (~mỗi 2 tuần)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          npm install

      - name: Clone game source
        run: |
          git clone https://github.com/Gzh0821/pvzge_web.git game_web
          mkdir -p dist
          cp -r game_web/docs/* dist/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri.conf.json version
          releaseName: "PvZ2 Gardendless v__VERSION__"
          releaseBody: "Automated Linux build for PvZ2 Gardendless."
          releaseDraft: true
          prerelease: false
