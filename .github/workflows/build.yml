name: Build Native Linux Version
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - '.github/workflows/build.yml'
      - 'package.json'
      - 'electron-main.js'
  schedule:
    - cron: '0 0 1,15 * *' # Chạy vào ngày 1 và 15 hằng tháng (~mỗi 2 tuần)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          npm install

      - name: Clone game source
        run: |
          git clone https://github.com/Gzh0821/pvzge_web.git game_web
          mkdir -p dist
          cp -r game_web/docs/* dist/

      - name: Get version
        id: package-version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Build Electron App
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built files
        run: ls -R dist_electron/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        with:
          files: |
            dist_electron/*.AppImage
            dist_electron/*.zsync
          tag_name: v${{ steps.package-version.outputs.version }}
          name: "v${{ steps.package-version.outputs.version }}"
          body: |
            Automated Linux build for PvZ2 Gardendless.

            ### 🚀 Quick Start (CLI)
            ```bash
            # Download the AppImage
            wget https://github.com/hthienloc/pvz2-gardendless-appimage/releases/download/v${{ steps.package-version.outputs.version }}/PvZ2-Gardendless-${{ steps.package-version.outputs.version }}.AppImage

            # Install and integrate with Gear Lever
            flatpak run it.mijorus.gearlever --integrate PvZ2-Gardendless-${{ steps.package-version.outputs.version }}.AppImage
            ```

            ### 🔄 Manual Update (Gear Lever)
            If auto-update is not working, please use the following settings in **Gear Lever**:
            - **Source**: `Github`
            - **Repo URL**: `https://github.com/hthienloc/pvz2-gardendless-appimage`
            - **Release file name**: `PvZ2-Gardendless-*.AppImage`
            - **Allow pre-releases**: Disabled
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-appimage
          path: dist_electron/*.AppImage
