name: Build Native Linux Version
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - 'package.json'
      - 'electron-main.js'
  schedule:
    - cron: '0 0 1,15 * *' # Chạy vào ngày 1 và 15 hằng tháng (~mỗi 2 tuần)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          npm install

      - name: Clone game source
        run: |
          git clone https://github.com/Gzh0821/pvzge_web.git game_web
          mkdir -p dist
          cp -r game_web/docs/* dist/

      - name: Get version
        id: package-version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Update README version
        run: |
          VERSION=${{ steps.package-version.outputs.version }}
          # Update version numbers in README.md
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v$VERSION/g" README.md
          sed -i "s/Gardendless-[0-9]\+\.[0-9]\+\.[0-9]\+/Gardendless-$VERSION/g" README.md
          
          # Setup git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push if changed
          git add README.md
          git commit -m "chore: update README version to v$VERSION [skip ci]" || echo "No changes to commit"
          git push

      - name: Build Electron App
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built files
        run: ls -R dist_electron/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        with:
          files: |
            dist_electron/*.AppImage
          tag_name: v${{ steps.package-version.outputs.version }}
          name: "v${{ steps.package-version.outputs.version }}"
          body: |
            Automated Linux build for PvZ2 Gardendless.

            ### 🚀 Quick Start (CLI)
            ```bash
            # 1. Install Gear Lever (if not already installed)
            flatpak install flathub it.mijorus.gearlever -y

            # 2. Download the AppImage
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.package-version.outputs.version }}/PvZ2-Gardendless-${{ steps.package-version.outputs.version }}.AppImage

            # 3. Install and integrate with Gear Lever
            flatpak run it.mijorus.gearlever --integrate PvZ2-Gardendless-${{ steps.package-version.outputs.version }}.AppImage --yes

            # 4. Configure GitHub auto-updates
            # Note: Gear Lever usually renames it to ~/AppImages/pvz2gardendless.appimage
            flatpak run it.mijorus.gearlever --set-update-source ~/AppImages/pvz2gardendless.appimage \
                --manager GithubUpdater \
                repo_url=https://github.com/hthienloc/pvz2-gardendless-appimage \
                repo_filename=PvZ2-Gardendless-*.AppImage \
                allow_prereleases=true
            ```

            ### 🔄 Automatic Updates
            Gear Lever notifies you when a new version is available. To manually check and install updates for all integrated apps via CLI, use:
            ```bash
            flatpak run it.mijorus.gearlever --update --all --yes
            ```
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-appimage
          path: dist_electron/*.AppImage
